<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purpul Chat 🍇</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= LOGIN OVERLAY ================= -->
<div id="login" class="login">

    <h1>🍇 Purpul Chat</h1>

    <p>crea tu usuario una vez y nunca más</p>

    <input id="user" placeholder="@user único">
    <input id="nickname" placeholder="nickname">

    <input type="file" id="photo">

    <button onclick="register()">Entrar al chat</button>

</div>

<!-- ================= CHAT ================= -->
<div id="chat" class="chat hidden">

    <div id="messages"></div>

    <div class="inputBox">
        <input id="msg" placeholder="escribe algo...">
        <button onclick="send()">➤</button>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
