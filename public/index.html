<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purpul Chat 🍇</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0012;
    color: white;
}

/* LAYOUT */
#app {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
#sidebar {
    width: 260px;
    background: #120018;
    padding: 10px;
    border-right: 1px solid #2a0033;
}

.section {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}

.user {
    padding: 8px;
    margin: 5px 0;
    background: #2a0033;
    border-radius: 10px;
    cursor: pointer;
}

/* CHAT */
#chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#msgs {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    max-width: 60%;
    margin: 6px;
    padding: 10px;
    border-radius: 14px;
    background: #2a0033;
}

.me {
    background: #7a2cff;
    margin-left: auto;
}

.bar {
    display: flex;
    padding: 10px;
    background: #120018;
}

.bar input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
}

/* LOGIN */
#login {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>🍇 Purpul Chat</h2>
    <input id="user" placeholder="@user">
    <button onclick="start()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="user" onclick="setChat('global')">💬 Global Chat</div>

        <div class="section">🟢 Online</div>
        <div id="users"></div>
    </div>

    <!-- CHAT -->
    <div id="chat">
        <div id="msgs"></div>

        <div class="bar">
            <input id="text" placeholder="mensaje...">
            <button onclick="send()">➤</button>
        </div>
    </div>

</div>

<script>
let user;
let ws;
let currentChat = "global";
let lastUsers = [];

/* LOGIN */
function start() {
    user = document.getElementById("user").value;

    localStorage.setItem("u", user);

    fetch("/user", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ id: user })
    });

    init();
}

/* INIT */
function init() {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";

    ws = new WebSocket(location.origin.replace("http", "ws"));

    ws.onopen = () => {
        ws.send(JSON.stringify({
            type: "join",
            user
        }));
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === "users") {
            renderUsers(msg.users);
        }

        if (msg.type === "global" && currentChat === "global") {
            render(msg.user, msg.text);
        }

        if (msg.type === "private") {
            if (currentChat === msg.from || currentChat === msg.to) {
                render(msg.from, msg.text);
            }
        }
    };
}

/* USERS SIDEBAR */
function renderUsers(list) {
    const box = document.getElementById("users");
    box.innerHTML = "";

    list.forEach(u => {
        if (u === user) return;

        const div = document.createElement("div");
        div.className = "user";
        div.innerText = "👤 " + u;

        div.onclick = () => setChat(u);

        box.appendChild(div);
    });
}

/* SWITCH CHAT */
function setChat(chat) {
    currentChat = chat;
    document.getElementById("msgs").innerHTML = "";
}

/* RENDER MESSAGE */
function render(from, text) {
    const box = document.getElementById("msgs");

    const div = document.createElement("div");
    div.className = "msg " + (from === user ? "me" : "");

    div.innerText = from + ": " + text;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

/* SEND */
function send() {
    const text = document.getElementById("text").value;

    if (currentChat === "global") {
        ws.send(JSON.stringify({
            type: "global",
            user,
            text
        }));
    } else {
        ws.send(JSON.stringify({
            type: "private",
            user,
            to: currentChat,
            text
        }));
    }

    document.getElementById("text").value = "";
}
</script>

</body>
</html>
