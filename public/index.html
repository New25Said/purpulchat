<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purpul Chat 🍇</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: #0b0012;
    color: white;
}

/* LOGIN */
#login {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #0b0012;
}

input {
    padding: 12px;
    margin: 6px;
    border-radius: 12px;
    border: none;
    outline: none;
    width: 240px;
}

/* CHAT ROOT */
#chat {
    display: none;
    height: 100vh;
    flex-direction: column;
}

/* HEADER estilo WhatsApp */
.header {
    background: #1a0026;
    padding: 12px;
    font-weight: bold;
    border-bottom: 1px solid #2a0033;
}

/* MESSAGES */
#msgs {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

/* BURBUJAS */
.msg {
    max-width: 70%;
    padding: 10px 12px;
    border-radius: 16px;
    background: #2a0033;
    align-self: flex-start;
    word-wrap: break-word;
}

.me {
    background: #7a2cff;
    align-self: flex-end;
}

/* INPUT BAR estilo WhatsApp */
.bar {
    display: flex;
    padding: 10px;
    gap: 8px;
    background: #120018;
    border-top: 1px solid #2a0033;
}

/* 🔥 ESTO ES LO IMPORTANTE */
#text {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
    outline: none;
    background: #1a0026;
    color: white;

    /* evita comportamiento de search */
    -webkit-appearance: none;
    appearance: none;
    font-size: 14px;
}

/* BOTÓN */
button {
    padding: 12px 16px;
    border-radius: 50%;
    background: #7a2cff;
    border: none;
    color: white;
    cursor: pointer;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>🍇 Purpul Chat</h2>
    <input id="user" placeholder="@user">
    <button onclick="start()">Entrar</button>
</div>

<!-- CHAT -->
<div id="chat">

    <div class="header">🟣 Purpul Chat</div>

    <div id="msgs"></div>

    <div class="bar">
        <input id="text" type="text" placeholder="Escribe un mensaje...">
        <button onclick="send()">➤</button>
    </div>

</div>

<script>
let user = localStorage.getItem("u");
let ws;

/* INIT */
if (user) init();

function start() {
    user = document.getElementById("user").value;
    localStorage.setItem("u", user);

    fetch("/user", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ id: user })
    });

    init();
}

function init() {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";

    ws = new WebSocket(location.origin.replace("http", "ws"));

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === "msg") render(msg.data);
    };

    loadHistory();

    // 🔥 ENTER PARA ENVIAR (LO QUE TE FALTABA)
    document.getElementById("text").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            send();
        }
    });
}

async function loadHistory() {
    const res = await fetch("/msgs");
    const msgs = await res.json();
    msgs.forEach(render);
}

function render(m) {
    const box = document.getElementById("msgs");

    const div = document.createElement("div");
    div.className = "msg " + (m.user === user ? "me" : "");
    div.textContent = m.user + ": " + m.text;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function send() {
    const input = document.getElementById("text");
    const text = input.value.trim();
    if (!text) return;

    ws.send(JSON.stringify({
        type: "msg",
        user,
        text
    }));

    input.value = "";
}
</script>

</body>
</html>
