<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purpul Chat 🍇</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0012;
    color: white;
}

#login {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    padding: 12px;
    margin: 6px;
    border-radius: 12px;
    border: none;
    outline: none;
    width: 240px;
}

#chat {
    display: none;
    height: 100vh;
    flex-direction: column;
}

.header {
    background: #1a0026;
    padding: 12px;
    font-weight: bold;
}

#msgs {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.msg {
    max-width: 65%;
    padding: 10px;
    border-radius: 14px;
    background: #2a0033;
    align-self: flex-start;
}

.me {
    background: #7a2cff;
    align-self: flex-end;
}

.name {
    font-size: 11px;
    opacity: 0.7;
    margin-bottom: 3px;
}

.bar {
    display: flex;
    padding: 10px;
    background: #120018;
}

#text {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
    outline: none;
    background: #1a0026;
    color: white;
}

button {
    padding: 12px 16px;
    border-radius: 50%;
    background: #7a2cff;
    border: none;
    color: white;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>🍇 Purpul Chat</h2>
    <input id="user" placeholder="@user">
    <button onclick="start()">Entrar</button>
</div>

<!-- CHAT -->
<div id="chat">

    <div class="header">🟣 Global Chat</div>

    <div id="msgs"></div>

    <div class="bar">
        <input id="text" placeholder="mensaje...">
        <button onclick="send()">➤</button>
    </div>

</div>

<script>
let user = localStorage.getItem("u");
let ws;

/* CACHE */
let messages = { global: [] };

if (user) init();

function start() {
    user = document.getElementById("user").value.trim();
    if (!user) return;

    localStorage.setItem("u", user);

    fetch("/user", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ id: user })
    });

    init();
}

function init() {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";

    ws = new WebSocket(location.origin.replace("http", "ws"));

    ws.onopen = () => {
        ws.send(JSON.stringify({
            type: "join",
            user
        }));
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === "global") {
            render(msg.user, msg.text);
        }
    };

    loadHistory();

    document.getElementById("text").addEventListener("keydown", e => {
        if (e.key === "Enter") send();
    });
}

async function loadHistory() {
    const res = await fetch("/msgs");
    const msgs = await res.json();

    msgs.forEach(m => render(m.user, m.text));
}

function render(from, text) {
    const box = document.getElementById("msgs");

    const div = document.createElement("div");
    div.className = "msg " + (from === user ? "me" : "");

    div.innerHTML = `
        <div class="name">${from}</div>
        <div>${text}</div>
    `;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function send() {
    const input = document.getElementById("text");
    const text = input.value.trim();
    if (!text) return;

    ws.send(JSON.stringify({
        type: "global",
        user,
        text
    }));

    input.value = "";
}
</script>

</body>
</html>
