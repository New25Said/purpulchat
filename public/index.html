<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purpul Chat 🍇</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0012;
    color: white;
}

/* LOGIN */
#login {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 10px;
    background: #7a2cff;
    border: none;
    color: white;
}

/* CHAT */
#chat {
    display: none;
    height: 100vh;
    flex-direction: column;
}

#msgs {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.msg {
    max-width: 70%;
    padding: 10px;
    margin: 5px;
    border-radius: 15px;
    background: #2a0033;
}

.me {
    background: #7a2cff;
    align-self: flex-end;
}

.bar {
    display: flex;
    padding: 10px;
    background: #120018;
}

.bar input {
    flex: 1;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>🍇 Purpul Chat PRO</h2>
    <input id="user" placeholder="@user">
    <button onclick="start()">Entrar</button>
</div>

<!-- CHAT -->
<div id="chat">

    <div id="msgs"></div>

    <div class="bar">
        <input id="text" placeholder="mensaje...">
        <button onclick="send()">➤</button>
    </div>

</div>

<script>
let user = localStorage.getItem("u");
let ws;

/* INIT */
if (user) init();

function start() {
    user = document.getElementById("user").value;
    localStorage.setItem("u", user);
    fetch("/user", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ id: user })
    });

    init();
}

function init() {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";

    ws = new WebSocket(location.origin.replace("http", "ws"));

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === "msg") {
            render(msg.data);
        }
    };

    loadHistory();
}

async function loadHistory() {
    const res = await fetch("/msgs");
    const msgs = await res.json();

    msgs.forEach(render);
}

function render(m) {
    const box = document.getElementById("msgs");

    const div = document.createElement("div");
    div.className = "msg " + (m.user === user ? "me" : "");

    div.innerText = m.user + ": " + m.text;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function send() {
    const text = document.getElementById("text").value;

    ws.send(JSON.stringify({
        type: "msg",
        user,
        text
    }));

    document.getElementById("text").value = "";
}
</script>

</body>
</html>
