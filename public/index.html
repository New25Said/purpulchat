<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purpul Chat 🍇</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0e0014;
    color: white;
}

#login {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 10px;
    background: #7a2cff;
    color: white;
    border: none;
}

#chat {
    display: none;
    height: 100vh;
    flex-direction: column;
}

#msgs {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    background: #2a0033;
    margin: 6px;
    padding: 10px;
    border-radius: 10px;
}

.me {
    background: #7a2cff;
    margin-left: auto;
    max-width: 70%;
}

.bar {
    display: flex;
    padding: 10px;
}

.bar input {
    flex: 1;
}
</style>

</head>
<body>

<div id="login">
    <h2>🍇 Purpul Chat</h2>
    <input id="user" placeholder="@user">
    <button onclick="enter()">Entrar</button>
</div>

<div id="chat">
    <div id="msgs"></div>

    <div class="bar">
        <input id="text">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
let user = localStorage.getItem("u");

if (user) start();

function enter() {
    user = document.getElementById("user").value;
    localStorage.setItem("u", user);

    fetch("/user", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ id: user })
    });

    start();
}

function start() {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";

    load();
    setInterval(load, 1200);
}

let last = 0;

async function load() {
    const res = await fetch("/msgs");
    const msgs = await res.json();

    const box = document.getElementById("msgs");

    for (let m of msgs) {
        if (m.t <= last) continue;
        last = m.t;

        const div = document.createElement("div");
        div.className = "msg " + (m.user === user ? "me" : "");

        div.innerText = m.user + ": " + m.text;

        box.appendChild(div);
    }

    box.scrollTop = box.scrollHeight;
}

function send() {
    const text = document.getElementById("text").value;

    fetch("/msg", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ user, text })
    });

    document.getElementById("text").value = "";
}
</script>

</body>
</html>
