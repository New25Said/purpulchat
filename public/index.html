<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purpul Chat 🍇</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0012;
    color: white;
}

#login {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    padding: 12px;
    margin: 6px;
    border-radius: 12px;
    border: none;
    outline: none;
}

/* APP */
#app {
    display: none;
    height: 100vh;
}

/* SIDEBAR */
#sidebar {
    width: 240px;
    background: #120018;
    padding: 10px;
    border-right: 1px solid #2a0033;
}

.user {
    padding: 8px;
    margin: 5px 0;
    background: #2a0033;
    border-radius: 10px;
    cursor: pointer;
}

#chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#msgs {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.msg {
    max-width: 60%;
    margin: 5px;
    padding: 10px;
    border-radius: 12px;
    background: #2a0033;
}

.me {
    background: #7a2cff;
    align-self: flex-end;
}

.bar {
    display: flex;
    padding: 10px;
    background: #120018;
}

.bar input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>🍇 Purpul Chat</h2>
    <input id="user" placeholder="@user">
    <button onclick="start()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

    <div style="display:flex;height:100vh">

        <!-- SIDEBAR -->
        <div id="sidebar">
            <div class="user" onclick="setChat('global')">💬 Global</div>
            <div id="users"></div>
        </div>

        <!-- CHAT -->
        <div id="chat">

            <div id="msgs"></div>

            <div class="bar">
                <input id="text" placeholder="mensaje...">
                <button onclick="send()">➤</button>
            </div>

        </div>

    </div>

</div>

<script>
let user;
let ws;
let current = "global";

let cache = {
    global: [],
    private: {}
};

/* LOGIN */
function start() {
    user = document.getElementById("user").value.trim();
    if (!user) return;

    fetch("/user", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ id: user })
    });

    localStorage.setItem("u", user);
    init();
}

function init() {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    ws = new WebSocket(location.origin.replace("http","ws"));

    ws.onopen = () => {
        ws.send(JSON.stringify({ type: "join", user }));
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === "users") {
            renderUsers(msg.users);
        }

        if (msg.type === "global") {
            cache.global.push(msg.data);
            if (current === "global") renderAll();
        }

        if (msg.type === "private") {
            const key = msg.from;
            if (!cache.private[key]) cache.private[key] = [];
            cache.private[key].push(msg);

            if (current === key) renderAll();
        }
    };

    loadHistory();
}

async function loadHistory() {
    const res = await fetch("/msgs");
    const msgs = await res.json();
    cache.global = msgs;
    renderAll();
}

/* SIDEBAR */
function renderUsers(list) {
    const box = document.getElementById("users");
    box.innerHTML = "";

    list.forEach(u => {
        if (u === user) return;

        const d = document.createElement("div");
        d.className = "user";
        d.innerText = "👤 " + u;
        d.onclick = () => setChat(u);

        box.appendChild(d);
    });
}

/* SWITCH CHAT */
function setChat(c) {
    current = c;
    renderAll();
}

/* RENDER */
function renderAll() {
    const box = document.getElementById("msgs");
    box.innerHTML = "";

    let data = [];

    if (current === "global") {
        data = cache.global;
    } else {
        data = cache.private[current] || [];
    }

    data.forEach(m => {
        const div = document.createElement("div");
        div.className = "msg " + (m.user === user || m.from === user ? "me" : "");

        div.innerText = (m.user || m.from) + ": " + m.text;

        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

/* SEND */
function send() {
    const input = document.getElementById("text");
    const text = input.value.trim();
    if (!text) return;

    if (current === "global") {
        ws.send(JSON.stringify({
            type: "global",
            user,
            text
        }));
    } else {
        ws.send(JSON.stringify({
            type: "private",
            user,
            to: current,
            text
        }));
    }

    input.value = "";
}
</script>

</body>
</html>
