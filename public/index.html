<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purpul Chat</title>
</head>
<body>

<h1>🍇 Purpul Chat</h1>

<button id="btn">
Crear documento de prueba
</button>

<pre id="result"></pre>

<script>

document
.getElementById("btn")
.onclick = async () => {

    const r =
        await fetch("/test", {
            method: "POST"
        });

    const data =
        await r.json();

    document
    .getElementById("result")
    .textContent =
        JSON.stringify(
            data,
            null,
            2
        );

};

</script>

</body>
</html>
